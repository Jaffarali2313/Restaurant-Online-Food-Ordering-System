<html>
    <head>
        <title>php login system</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
    background: #eee;
    display: flex;
    align-items: center;

}
#frm{

}

}
#btn{
    color: greenyellow;

    border-radius: 3px;
    cursor:pointer;

}

    </head>
    <body>
        <div id="frm">
            <h1>login</h1>
            <form name="f1"action="login.php"method="POST">

                <label><b>Password: </b></label>
