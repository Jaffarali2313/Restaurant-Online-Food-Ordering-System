<!DOCTYPE html>
<html>
<head>
<title>Sign In</title>
<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f5f5f5;
}
.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:150px;
    border-radius:108px;
    box-shadow:0px 0px 10px gray;
}
h2{
    text-align:center;
}
input[type=text], input[type=password]{
    width:100%;
    padding:10px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background-color:#c40000;
    color:white;
    border:none;
    font-weight:bold;
}
button:hover{
    background-color:#990000;
}
.terms-content{
    display:none;
    margin-top:20px;
    padding:15px;
    background-color:gold;
    color:black;
    font-size:14px;
    border-radius:6px;
}
</style>
<script>
function validateForm(){
    var checkBox = document.getElementById("agree");
    if(!checkBox.checked){
        alert("Please Read Terms and Conditions Before Signin");
        return false;
    }
    return true;
}
</script>
</head>
<body>
<div class="container">
<h2>Sign In</h2>
<form action="sign.php" method="POST" onsubmit="return validateForm()">
<input type="text" name="username"placeholder="Username" required><br><br>
<input type="tel" name="phone" placeholder="Phone number" pattern="[0-9]{10}" required><br><br>
<input type="checkbox" id="agree"> 
I agree to the <a href="terms.html">Terms & Conditions</a>
<br><br>
<button type="submit">Sign In</button>
</form>
</div>
</body>
</html>
